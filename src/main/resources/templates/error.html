<!DOCTYPE html>
<html> xmlns:th="http://www.thymeleaf.org>
<head>
    <title>Error</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .error-box {
            border: 1px solid red;
            background-color: white;
            color: darkred;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
        }

        a {
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="error-box">
    <h1 th:text="${errorTitle}">Error</h1>
    <p th:text="${errorMessage}">Something went wrong</p>
    <a th:href="@{/books}">Back to list</a>
</div>

</body>
</html>
