<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Books</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 13px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #222;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-content: center;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background-color: #2e7d32;
        }

        .btn-primary:hover {
            background-color: #256628;
        }

        .btn-warning {
            background-color: #ef6c00;
            color: white;
        }

        .btn-warning:hover {
            background-color: #d65f00;
        }

        .btn-danger {
            background-color: #c62828;
        }

        .btn-danger:hover {
            background-color: #a91f1f;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }

        thead {
            background-color: #1565c0;
            color: white;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
        }

        tbody tr:nth-child(even) {
            background-color: #f8f9fd;
        }

        tbody tr:hover {
            background-color: #eef4ff;
        }

        .action {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .action form {
            margin: 0;
        }

        .empty-message {
            padding: 20px;
            text-align: center;
            color: #666;
            background-color: #fafafa;
            border: 1px dashed #ccc;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="containter">
    <div class="card">
        <div class="top-bar">
            <h1>Book List</h1>
            <a th:href="@{/books/create}" class="btn btn-primary">Add Book</a>
        </div>

        <table th:if="${not #lists.isEmpty(books)}">
            <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Published Date</th>
                <th>Author</th>
                <th>Pages</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.title}">Title</td>
                <td th:text="${book.description}">Description</td>
                <td th:text="${book.publishedDate}">Published Date</td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.pages}"></td>
                <td>
                    <div class="action">
                        <a class="btn btn-warning"
                           th:href="@{/books/edit/{id}(id=${book.id})}">
                            Edit
                        </a>


                        <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post">
                            <button class="btn btn-danger"
                                    type="submit"
                                    onclick="return confirm('Are you sure you want to delete this book?')">
                                Delete
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="empty-message" th:if="${#lists.isEmpty(books)}">
            No books found. Click "Add Book" to create your first book.
        </div>
    </div>
</div>

</body>
</html>
