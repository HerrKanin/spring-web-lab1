<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Books</title>
</head>
<body>

<h1>Book List</h1>

<a th:href="@{/books/create}">Add Book</a>

<table border="1">
    <thead>
    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Pages</th>
        <th>Action</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.pages}"></td>

        <td>
            <a th:href="@{/books/edit/{id}(id=${book.id})}">Edit</a>

            <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>

    </tbody>

</table>
</body>
</html>
