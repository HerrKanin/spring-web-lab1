<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Book</title>

    <style>
        .error {
            color: red;
            font-size: 14px;
        }

        .error-border {
            border: 2px solid red;
        }
    </style>
</head>
<body>

<h1>Create Book</h1>

<form th:action="@{/books/create}" th:object="${book}" method="post">
    <div>
        <label>Title:</label>
        <input type="text" th:field="*{title}">

        <div class="error"
             th:if="${#fields.hasErrors('title')}"
             th:errors="*{title}">
        </div>
    </div>

    <div>
        <label>Description:</label>
        <input type="text" th:field="*{description}">

        <div class="error"
             th:if="${#fields.hasErrors('description')}"
             th:errors="*{description}">
        </div>
    </div>

    <div>
        <label>Published Date:</label>
        <input type="text" th:field="*{publishedDate}">
        <small>Format: yyyy-MM-dd</small>

        <div class="error"
             th:if="${publishedDateError != null}"
             th:text="${publishedDateError}">
        </div>

        <div class="error"
             th:if="${publishedDateError == null and #fields.hasErrors('publishedDate')}"
             th:errors="*{publishedDate}">
        </div>
    </div>

    <div>
        <label>Author:</label>
        <input type="text" th:field="*{author}">

        <div class="error"
             th:if="${#fields.hasErrors('author')}"
             th:errors="*{author}">
        </div>
    </div>

    <div>
        <label>Pages:</label>
        <input type="number" th:field="*{pages}">

        <div class="error"
             th:if="${#fields.hasErrors('pages')}"
             th:errors="*{pages}">
        </div>
    </div>

    <button type="submit">Save</button>
</form>

<a th:href="@{/books}">Back to list</a>

</body>
</html>
