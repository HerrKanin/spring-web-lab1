<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Book</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #222;
        }


        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: aqua;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
        }

        .error {
            color: red;
            font-size: 13px;
            margin-top: 5px;
        }

        .error-box {
            color: darkred;
            border: 1px solid lightcoral;
            background-color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .hint {
            display: block;
            margin-top: 4px;
            color: grey;
            font-size: 12px;
        }

        .action {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background-color: darkgreen;
            color: white;
        }

        .btn-primary:hover {
            background-color: #256628;
        }

        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #d5d5d5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Create Book</h1>

        <form th:action="@{/books/create}" th:object="${book}" method="post">

            <div class="error-box" th:if="${#fields.hasAnyErrors()}">
                Please correct the error below.
            </div>

            <div class="form-group">
                <label>Title:</label>
                <input type="text" th:field="*{title}" maxlength="100">
                <div class="error"
                     th:if="${#fields.hasErrors('title')}"
                     th:errors="*{title}">
                </div>
            </div>

            <div class="form-group">
                <label>Description:</label>
                <input type="text" th:field="*{description}" maxlength="500">
                <div class="error"
                     th:if="${#fields.hasErrors('description')}"
                     th:errors="*{description}">
                </div>
            </div>

            <div class="form-group">
                <label>Published Date:</label>
                <input type="text" th:field="*{publishedDate}">
                <small class="hint">Format: yyyy-MM-dd</small>

                <div class="error"
                     th:if="${publishedDateError != null}"
                     th:text="${publishedDateError}">
                </div>

                <div class="error"
                     th:if="${publishedDateError == null and #fields.hasErrors('publishedDate')}"
                     th:errors="*{publishedDate}">
                </div>
            </div>

            <div class="form-group">
                <label>Author:</label>
                <input type="text" th:field="*{author}" maxlength="100">
                <div class="error"
                     th:if="${#fields.hasErrors('author')}"
                     th:errors="*{author}">
                </div>
            </div>

            <div class="form-group">
                <label>Pages:</label>
                <input type="number" th:field="*{pages}">
                <div class="error"
                     th:if="${#fields.hasErrors('pages')}"
                     th:errors="*{pages}">
                </div>
            </div>

            <div class="action">
                <button type="submit" class="btn btn-primary">Save Book</button>
                <a th:href="@{/books}" class="btn btn-secondary">Back To List</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
